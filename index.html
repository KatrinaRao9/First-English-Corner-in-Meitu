<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 单词不重复抽背 · 课堂随机抽查</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #f0f4fa 0%, #e6ecf5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 16px;
        }

        .card {
            max-width: 880px;
            width: 100%;
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 48px;
            padding: 32px 32px 40px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25), inset 0 1px 2px rgba(255,255,255,0.6);
            border: 1px solid rgba(255,255,255,0.5);
            transition: all 0.2s ease;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #1e2b3a, #2c3e50);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .subhead {
            color: #4a5b6e;
            font-weight: 400;
            font-size: 1rem;
            margin-bottom: 28px;
            border-left: 4px solid #7c8fa8;
            padding-left: 18px;
            background: #f1f5f9b3;
            border-radius: 0 20px 20px 0;
            line-height: 1.4;
        }

        .stats-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 18px 24px;
            border-radius: 40px;
            margin-bottom: 30px;
            box-shadow: 0 8px 18px -6px rgba(0,20,40,0.12), 0 0 0 1px rgba(0,0,0,0.02);
        }

        .counter {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }

        .pill {
            background: #e9eef3;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 500;
            color: #1e2f40;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pill span {
            background: white;
            padding: 2px 12px;
            border-radius: 30px;
            font-weight: 600;
            color: #0b1c2c;
        }

        .progress-bar {
            width: 200px;
            height: 8px;
            background: #d0dae6;
            border-radius: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #2f5e8c;
            width: 0%;
            border-radius: 20px;
            transition: width 0.2s ease;
        }

        .draw-area {
            background: white;
            border-radius: 40px;
            padding: 40px 24px;
            margin-bottom: 28px;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.02), 0 20px 30px -12px rgba(28, 52, 84, 0.25);
            border: 1px solid rgba(255,255,255,0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 240px;
        }

        .word-display {
            text-align: center;
            width: 100%;
        }

        .english-word {
            font-size: 4.2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #0e2238;
            line-height: 1.2;
            word-break: break-word;
            text-shadow: 0 2px 5px rgba(0,20,50,0.1);
        }

        .chinese-meaning {
            font-size: 2rem;
            font-weight: 400;
            color: #2f4b70;
            margin-top: 8px;
            opacity: 0.9;
            border-top: 2px dashed #cbd6e4;
            padding-top: 16px;
            display: inline-block;
            padding-left: 24px;
            padding-right: 24px;
        }

        .placeholder-message {
            font-size: 1.6rem;
            color: #8f9fb2;
            font-weight: 400;
            text-align: center;
            padding: 20px;
        }

        .button-group {
            display: flex;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .btn {
            border: none;
            background: white;
            padding: 14px 38px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 8px 18px -8px rgba(0,32,64,0.2);
            transition: all 0.15s ease;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.7);
            color: #1f3a57;
        }

        .btn-primary {
            background: #1e3a5f;
            color: white;
            box-shadow: 0 12px 24px -10px #1e3a5f;
            border: 1px solid #5680b0;
        }

        .btn-primary:hover {
            background: #254f7a;
            transform: translateY(-3px);
            box-shadow: 0 22px 28px -12px #16344d;
        }

        .btn-secondary {
            background: #eef3f9;
            color: #1f3a57;
        }

        .btn-secondary:hover {
            background: white;
            transform: translateY(-2px);
            box-shadow: 0 12px 22px -10px #1f3a57;
        }

        .btn:active {
            transform: translateY(1px);
            box-shadow: 0 6px 12px -6px #0b1c2c;
        }

        .btn:disabled {
            opacity: 0.4;
            pointer-events: none;
            filter: grayscale(0.3);
        }

        .list-preview {
            background: #f8fafd;
            border-radius: 28px;
            padding: 22px 24px;
            margin-top: 30px;
            border: 1px solid rgba(255,255,255,0.7);
        }

        .list-title {
            font-weight: 600;
            color: #1a304a;
            margin-bottom: 12px;
            font-size: 0.95rem;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .word-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 14px;
            max-height: 120px;
            overflow-y: auto;
            padding: 4px 2px;
            align-items: center;
        }

        .word-chip {
            background: white;
            padding: 6px 14px;
            border-radius: 32px;
            font-size: 0.9rem;
            color: #1d3b5c;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            border: 1px solid #dde5ef;
            transition: all 0.1s;
            display: inline-flex;
            gap: 5px;
        }

        .word-chip.drawn {
            opacity: 0.35;
            text-decoration: line-through;
            background: #e2e8f0;
            color: #6f7d8f;
            border-color: transparent;
            order: 1;
        }

        .word-chip .cn-mini {
            font-size: 0.75rem;
            color: #5c6f88;
            max-width: 70px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .reset-icon {
            font-size: 1.2rem;
            line-height: 1;
        }

        footer {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #5c708a;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎲 单词不重复抽背 · 3.18 单词库</h1>
        <div class="subhead">🇨🇳 每个单词均含中文翻译 · 点击抽取直到复习完毕</div>

        <div class="stats-panel">
            <div class="counter">
                <div class="pill">📋 剩余 <span id="remainingCount">--</span></div>
                <div class="pill">✅ 已抽 <span id="drawnCount">--</span></div>
            </div>
            <div class="progress-bar" title="抽取进度">
                <div class="progress-fill" id="progressFill" style="width:0%"></div>
            </div>
        </div>

        <!-- 抽卡主显示区 -->
        <div class="draw-area" id="drawArea">
            <div class="word-display" id="wordDisplay">
                <div class="placeholder-message">✨ 点击下方按钮开始抽查</div>
            </div>
        </div>

        <!-- 操作按钮组 -->
        <div class="button-group">
            <button class="btn btn-primary" id="drawBtn">🎯 抽 取 单 词</button>
            <button class="btn btn-secondary" id="resetBtn">⟲ 重 置 进 度</button>
        </div>

        <!-- 单词表预览 + 状态小标签 -->
        <div class="list-preview">
            <div class="list-title">
                <span>📌 单词清单 (中英对照预览)</span>
                <span style="font-weight:normal;font-size:0.8rem;">{{总词数}} 词 · 灰色为已抽</span>
            </div>
            <div class="word-cloud" id="wordCloudContainer">
                <!-- 动态通过js渲染所有单词chip，展示英文＋简略中文 -->
            </div>
        </div>
        <footer>✔️ 每次抽取均不重复，直到所有单词出现一次 | 中文释义内置</footer>
    </div>

    <script>
        (function() {
            // ----- 从excel粘贴整理的数据 (英文 + 人工标注中文意思, 确保与列表顺序一致) -----
            const rawWords = [
                "meeting", "appreciate", "Christmas", "begin", "deadline", "whiteboard", "Halloween", "hotpot",
                "coffee", "RoboNeo", "Thanksgiving Day", "mooncake", "computer", "social media", "ticket", "bed sheet",
                "photographer", "slogan", "perfume", "pillow", "driver", "passion", "exhibition", "mouse",
                "chair", "challenge", "promotion", "asset", "write", "status quo", "stress", "patent",
                "hungry", "makeup", "understand", "phone case", "bicycle", "Christmas", "garbage", "charger",
                "screen", "sticky note", "wrinkles", "balloon", "holiday", "skin", "percentage", "boundary",
                "dumpling", "interview", "sparkling water", "gap", "Chinese", "competitor", "mirror", "",
                "brain", "influencer", "elevator", "", "request", "agree", "projector", "",
                "Wink", "library", "invite", "", "design", "washroom", "university", "",
                "BeautyPlus", "female", "translate", "", "schedule", "male", "vote", "",
                "presentation", "gym", "clarify", "", "customer", "soccer", "straight", "",
                "client", "Thailand", "estimate", "", "team", "Vietnam", "skip", "",
                "project", "Malaysia", "feedback", "", "introduce", "waterbottle", "crucial", "",
                "revenue", "earphone", "contract", "", "success", "bug", "policy", "",
                "password", "coding", "advice", "", "expense", "email", "delay", "",
                "request", "department", "luggage", "", "bank", "English", "foreign", "",
                "investment", "camera", "hand cream", "", "rule", "power bank", "whipping cream", "",
                "risk", "tennis", "interrupt", "", "milestone", "badminton", "construction", "",
                "timeline", "sunglass", "microphone", "", "departure", "heartbeat", "break up", "",
                "technology", "March", "parking lot", "", "feedback", "September", "negative", "",
                "government", "latte", "outsourcing", "", "social", "oat milk", "customer service", "",
                "environment", "convergence", "lobby", "", "opinion", "business class", "European", "",
                "brainstorm", "optimization", "operation", "", "front desk", "sandwich", "administration", "",
                "globalization", "pasta", "business trip", "", "stock", "weakness", "interesting", "",
                "limited", "strength", "offer", "", "collaborate", "advantage", "concern", ""
            ];

            // 中文对照 (与英文一一对应, 包括空格占位, 保证索引相同)
            const cnMeanings = [
                "会议", "感激", "圣诞节", "开始", "截止日期", "白板", "万圣节", "火锅",
                "咖啡", "罗伯尼奥", "感恩节", "月饼", "电脑", "社交媒体", "票", "床单",
                "摄影师", "标语", "香水", "枕头", "司机", "热情", "展览", "鼠标",
                "椅子", "挑战", "晋升", "资产", "写", "现状", "压力", "专利",
                "饥饿的", "化妆", "理解", "手机壳", "自行车", "圣诞节", "垃圾", "充电器",
                "屏幕", "便利贴", "皱纹", "气球", "假日", "皮肤", "百分比", "边界",
                "饺子", "面试", "气泡水", "差距", "中文", "竞争对手", "镜子", "",
                "大脑", "网红", "电梯", "", "请求", "同意", "投影仪", "",
                "眨眼", "图书馆", "邀请", "", "设计", "洗手间", "大学", "",
                "美颜相机", "女性", "翻译", "", "日程表", "男性", "投票", "",
                "演示", "健身房", "澄清", "", "顾客", "足球", "直接的", "",
                "客户", "泰国", "估计", "", "团队", "越南", "跳过", "",
                "项目", "马来西亚", "反馈", "", "介绍", "水瓶", "关键的", "",
                "收入", "耳机", "合同", "", "成功", "漏洞", "政策", "",
                "密码", "编程", "建议", "", "开支", "邮件", "延迟", "",
                "请求", "部门", "行李", "", "银行", "英语", "外国的", "",
                "投资", "相机", "护手霜", "", "规则", "充电宝", "淡奶油", "",
                "风险", "网球", "打断", "", "里程碑", "羽毛球", "施工", "",
                "时间表", "太阳镜", "麦克风", "", "出发", "心跳", "分手", "",
                "技术", "三月", "停车场", "", "反馈", "九月", "消极的", "",
                "政府", "拿铁", "外包", "", "社会的", "燕麦奶", "客户服务", "",
                "环境", "融合", "大厅", "", "观点", "商务舱", "欧洲的", "",
                "头脑风暴", "优化", "手术/运作", "", "前台", "三明治", "管理", "",
                "全球化", "意大利面", "出差", "", "股票", "弱点", "有趣的", "",
                "有限的", "力量/优势", "提供", "", "合作", "优点", "关注/担忧", ""
            ];

            // 由于excel里有些行列空单元格导致rawWords里面出现空字符串，我们构建最终有效单词列表(排除空字符串)
            // 同时保留中英文对应，只保留英文非空且对应中文存在(中文可能空但是保留)
            const wordList = [];
            const translationMap = new Map(); // 英文 -> 中文

            for (let i = 0; i < rawWords.length; i++) {
                const en = rawWords[i]?.trim();
                if (en && en !== "") {   // 只保留非空英文单词
                    // 如果英文已经存在(比如Christmas出现两次，保留第一个遇见的中文，但后面可以覆盖？实际上重复单词我们认为是一个词，但中文一致可保留，但圣诞节出现了两次，我们保留一个)
                    // 但是为了列表不重复展示同一个英文（去重），但单词库本身有重复？原表格Christmas出现两次，按需保留一个还是保留两个？
                    // 原表格中 Christmas 确实出现两次。为了保证抽取时两个都出现（单词库有重复则视为两个独立抽项）？但需求是“所有单词” 应该包含重复项。
                    // 如果去重会丢失重复项，但课堂抽背可能希望每个出现的格子都独立。所以我们保留重复项，但中文显示相同。
                    // 但Map会去重，所以不用Map存列表，改用两个平行数组。
                    // 重新采用两个独立数组保持长度一致。
                    // 下面重新处理，直接构建wordList和cnList，不跳过重复。
                }
            }

            // 更稳健做法：重新构建两个等长数组，排除英文为空的条目。
            const finalEn = [];
            const finalCn = [];
            for (let i = 0; i < rawWords.length; i++) {
                const en = rawWords[i]?.trim();
                if (en && en !== "") {   // 只要英文非空就加入（保留重复项）
                    finalEn.push(en);
                    // 对应中文，可能为空时给个占位符
                    let cn = (cnMeanings[i] && cnMeanings[i].trim()) ? cnMeanings[i].trim() : "🕊️无释义";
                    finalCn.push(cn);
                }
            }

            // 最终词库 (保留所有非空英文, 包括重复)
            const vocabulary = finalEn;
            const translations = finalCn;

            // 初始化状态
            let remainingIndices = [];            // 未抽取索引的副本 (存索引)
            let drawnIndices = [];                 // 已抽取索引（按抽取顺序）

            // DOM 元素
            const drawBtn = document.getElementById('drawBtn');
            const resetBtn = document.getElementById('resetBtn');
            const remainingSpan = document.getElementById('remainingCount');
            const drawnSpan = document.getElementById('drawnCount');
            const progressFill = document.getElementById('progressFill');
            const wordDisplayDiv = document.getElementById('wordDisplay');
            const wordCloudContainer = document.getElementById('wordCloudContainer');

            // 辅助函数更新计数&进度
            function updateStats() {
                const remaining = remainingIndices.length;
                const drawn = drawnIndices.length;
                remainingSpan.textContent = remaining;
                drawnSpan.textContent = drawn;
                const total = vocabulary.length;
                const percent = total ? (drawn / total) * 100 : 0;
                progressFill.style.width = percent + '%';

                // 同时重新渲染单词云 (展示所有单词，标记是否已抽)
                renderWordCloud();
            }

            // 绘制单词chip (中英预览)
            function renderWordCloud() {
                if (!wordCloudContainer) return;
                wordCloudContainer.innerHTML = ''; 
                const total = vocabulary.length;
                for (let i = 0; i < total; i++) {
                    const en = vocabulary[i];
                    const cn = translations[i] || "";
                    const isDrawn = drawnIndices.includes(i);
                    const chip = document.createElement('span');
                    chip.className = 'word-chip' + (isDrawn ? ' drawn' : '');
                    // 限制中文显示长度，太长的截断
                    const shortCn = cn.length > 6 ? cn.slice(0, 5) + '…' : cn;
                    chip.innerHTML = `${en} <span class="cn-mini">${shortCn}</span>`;
                    wordCloudContainer.appendChild(chip);
                }
            }

            // 重置/初始化抽背
            function resetDrawing() {
                // 剩余索引 = 所有索引的副本 (0 ~ vocabulary.length-1)
                remainingIndices = Array.from({ length: vocabulary.length }, (_, i) => i);
                // 打乱一下让初始顺序随机些 (但不是必须)
                for (let i = remainingIndices.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [remainingIndices[i], remainingIndices[j]] = [remainingIndices[j], remainingIndices[i]];
                }
                drawnIndices = [];
                updateStats();
                // 清空显示区
                wordDisplayDiv.innerHTML = `<div class="placeholder-message">🔄 已重置，点击抽取</div>`;
            }

            // 抽取一个新单词（不重复）
            function drawOneWord() {
                if (remainingIndices.length === 0) {
                    // 所有单词抽完了
                    wordDisplayDiv.innerHTML = `<div class="placeholder-message">🎉 恭喜！所有单词已抽过一遍</div>`;
                    return;
                }

                // 从remainingIndices随机选一个索引 (并且移除)
                const randomIndex = Math.floor(Math.random() * remainingIndices.length);
                const selectedIdx = remainingIndices[randomIndex];
                // 移到已抽集合
                remainingIndices.splice(randomIndex, 1);
                drawnIndices.push(selectedIdx);

                // 获取中英文
                const enWord = vocabulary[selectedIdx];
                const cnWord = translations[selectedIdx] || "🕊️";

                // 更新显示区域
                wordDisplayDiv.innerHTML = `
                    <div class="english-word">${enWord}</div>
                    <div class="chinese-meaning">${cnWord}</div>
                `;

                // 更新计数和进度
                updateStats();
            }

            // 重置事件
            resetBtn.addEventListener('click', () => {
                resetDrawing();
            });

            // 抽取事件
            drawBtn.addEventListener('click', () => {
                drawOneWord();
            });

            // 初始化：重置状态，渲染云
            resetDrawing();

            // 确保初始时无抽取内容显示占位
            // reset已做

            // 额外：当所有单词抽完时再点击抽取依然显示庆祝语
            // 但为了体验，如果抽完了再点抽，保留庆祝信息 (drawOneWord已经处理)
            // 微调边界： 如果抽完点抽，依旧展示完成占位
            // 最后，检查总词数更新到footer预览
            const totalWords = vocabulary.length;
            document.querySelector('.list-title span:last-child').textContent = `共${totalWords}词 · 灰色为已抽`;

        })();
    </script>
</body>
</html>
